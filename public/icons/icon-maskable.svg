<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Skillet">
  <!--
    Maskable variant. The platform crops aggressively; the spec recommends
    keeping the meaningful glyph inside the inner ~80% safe zone (a circle
    of radius 205 around the center). Here we drop the rounded-square chrome
    in favor of a full-bleed cream tile, and shrink the glyph to ~50% so the
    OS mask (circle, squircle, rounded square) never clips the skillet.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(70)">
      <stop offset="0" stop-color="#F6F1E8"/>
      <stop offset="1" stop-color="#EFE7D8"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>

  <!-- 50% glyph: 256px centered. Scale 256/36 = 7.1111. Offset 128. -->
  <g transform="translate(128, 128) scale(7.1111)">
    <circle cx="17" cy="20" r="11" fill="#C0502B"/>
    <path d="M28 20 L34 20" stroke="#C0502B" stroke-width="3.4" stroke-linecap="round"/>
    <circle cx="13.5" cy="17" r="1.8" fill="#fff" opacity="0.85"/>
    <circle cx="20" cy="22" r="1.2" fill="#fff" opacity="0.55"/>
    <circle cx="17" cy="14" r="1" fill="#E8B25C"/>
  </g>
</svg>
