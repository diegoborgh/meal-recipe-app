<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Skillet">
  <!--
    Master Skillet app icon. Source of truth for all generated PNG sizes.
    Spec: docs/design-handoff/project/screens-utility.jsx → AppIcon().
    Rounded-square chrome (radius = 22% of size = 113px), warm cream gradient,
    centered skillet glyph at 62% of icon size, terracotta accent + honey dot.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(70)">
      <stop offset="0" stop-color="#F6F1E8"/>
      <stop offset="1" stop-color="#EFE7D8"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square chrome -->
  <rect x="0" y="0" width="512" height="512" rx="113" ry="113" fill="url(#bg)"/>

  <!-- Skillet glyph: 62% of 512 = ~317.4px, centered.
       Source viewBox is 0 0 36 36; map via translate + scale.
       Center: 256,256. Offset by -158.7 in each axis to center 317.44 around 256.
       Scale factor: 317.44 / 36 = 8.8178 -->
  <g transform="translate(97.28, 97.28) scale(8.8178)">
    <circle cx="17" cy="20" r="11" fill="#C0502B"/>
    <path d="M28 20 L34 20" stroke="#C0502B" stroke-width="3.4" stroke-linecap="round"/>
    <circle cx="13.5" cy="17" r="1.8" fill="#fff" opacity="0.85"/>
    <circle cx="20" cy="22" r="1.2" fill="#fff" opacity="0.55"/>
    <circle cx="17" cy="14" r="1" fill="#E8B25C"/>
  </g>
</svg>
